// 扩展清理任务以包含所有平台
clean {
    dependsOn cleanAllPlatforms
}

// 跨平台构建任务
task buildCrossPlatform {
    group = 'build'
    description = '一键跨平台构建（Linux + Windows）'
    // 确保当前平台(如Linux)的 .so 已构建并复制到资源目录
    dependsOn buildNativeDev
    
    doLast {
        if (!project.hasProperty('withCross')) {
            println "⏭️ 跳过跨平台构建（未指定 -PwithCross）"
            return
        }
        println "🚀 开始跨平台构建流程..."
        println ""
        
        // 1. 交叉编译Windows DLL
        println "📦 [1/3] 交叉编译Windows DLL..."
        exec {
            workingDir projectDir
            // 使用 bash 调用脚本，避免可执行权限导致的启动失败
            commandLine 'bash', "${projectDir}/src/main/native/scripts/cross_compile_windows.sh"
        }
        
        // 2. 确保Windows DLL复制到资源目录
        println "📁 [2/3] 复制Windows DLL到资源目录..."
        def resourceDir = file("$projectDir/src/main/resources/native")
        resourceDir.mkdirs()
        copy {
            from file("$projectDir/target/native/windows/pathfinder_native.dll")
            into resourceDir
        }
        // 同时确保将当前平台(如Linux)的 .so 复制到资源目录，便于JAR同时包含两种平台库
        def linuxSoFile = file("$projectDir/target/native/linux/libpathfinder_native.so")
        if (linuxSoFile.exists()) {
            copy {
                from linuxSoFile
                into resourceDir
                rename { "pathfinder_native.so" }
            }
        }
        
        println "✅ 跨平台构建完成！"
        println ""
        println "📊 构建结果:"
        def windowsDll = file("$projectDir/target/native/windows/pathfinder_native.dll")
        def linuxSoOut = file("$projectDir/target/native/linux/libpathfinder_native.so")
        
        if (windowsDll.exists()) {
            println "  ✅ Windows DLL: ${windowsDll.name} (${windowsDll.length()} bytes)"
        }
        if (linuxSoOut.exists()) {
            println "  ✅ Linux SO: ${linuxSoOut.name} (${linuxSoOut.length()} bytes)"
        }
    }
}

// 当指定 -PwithCross 时，确保在处理资源前完成跨平台构建与复制
if (project.hasProperty('withCross')) {
    tasks.processResources.dependsOn buildCrossPlatform
}

// 快速跨平台开发构建
task buildDevCross {
    group = 'build'  
    description = '快速跨平台开发构建（Linux + Windows + JAR）'
    // 先构建当前平台Native，再交叉编译Windows DLL并复制到资源，最后打包JAR
    dependsOn buildNativeDev
    // 交叉编译并复制Windows DLL（仅在Linux上有效）
    dependsOn 'crossWindowsDevCopy'
    dependsOn shadowJar
    
    doLast {
        println ""
        println "🎉 快速跨平台开发构建完成！"
        println "📁 最终产物:"
        println "  - JAR包: ${tasks.shadowJar.archiveFile.get().asFile.path}"
        println "  - Windows DLL: target/native/windows/pathfinder_native.dll" 
        println "  - Linux SO: target/native/linux/libpathfinder_native.so"
        println ""
    }
}

// 交叉编译Windows DLL并复制到资源目录（用于 buildDevCross）
task crossWindowsDevCopy {
    group = 'native'
    description = 'Linux下交叉编译Windows DLL并复制到资源目录以便打包'
    doLast {
        if (!isLinux) {
            println "⏭️ 非Linux环境，跳过交叉编译Windows DLL"
            return
        }
        println "📦 交叉编译Windows DLL (Gradle内置流程)..."
        def javaHome = System.getProperty('java.home')
        if (!javaHome) {
            throw new GradleException("❌ 未检测到 Java 环境 (java.home)")
        }
        def cmakeToolchain = file("$projectDir/src/main/native/cmake/windows-cross.cmake")
        if (!cmakeToolchain.exists()) {
            throw new GradleException("❌ 未找到工具链文件: ${cmakeToolchain.path}")
        }
        // 使用全新构建目录避免权限残留问题
        def winBuildDir = file("$projectDir/src/main/native/build-win-gradle-${System.currentTimeMillis()}")
        winBuildDir.mkdirs()
        // 配置
        exec {
            commandLine 'cmake', '-S', "$projectDir/src/main/native", '-B', winBuildDir.path,
                    "-DCMAKE_TOOLCHAIN_FILE=${cmakeToolchain.path}",
                    '-DCMAKE_BUILD_TYPE=Release',
                    "-DJAVA_HOME=${javaHome}"
        }
        // 构建
        exec {
            commandLine 'cmake', '--build', winBuildDir.path, '--config', 'Release', '--parallel'
        }
        println "📁 复制Windows DLL到资源目录..."
        def resourceDir = file("$projectDir/src/main/resources/native")
        resourceDir.mkdirs()
        copy {
            from file("$projectDir/target/native/windows/pathfinder_native.dll")
            into resourceDir
        }
        println "✅ Windows DLL 已复制到资源目录，将随JAR一同打包"
    }
}

